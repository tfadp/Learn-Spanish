{% extends "base.html" %}

{% block title %}Song — LyricFlow{% endblock %}

{% block content %}
<!-- Wavesurfer.js: visual waveform + draggable regions for timestamp editing -->
<script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
<!--
    Main learning screen: Checklist + Slide-up Card (Line & Stack modes).
    Self-contained: audio engine, touch gestures, mastery — all inline.
    song_id injected by FastAPI via Jinja2 context.
-->
<div x-data="songPage({{ song_id }})" x-init="load_song()">

    <!-- ===== CHECKLIST HEADER ===== -->
    <header class="checklist-header">
        <a href="/" class="back-btn" aria-label="Back to library">
            &#8592;
        </a>
        <div class="checklist-title">
            <h1 x-text="song.title || 'Loading...'"></h1>
            <div class="artist-label" x-text="song.artist || ''"></div>
        </div>
        <span class="mastery-count" x-text="mastered_count + '/' + lines.length + ' &#10003;'"></span>
    </header>

    <!-- ===== RE-SYNC BUTTON ===== -->
    <div style="text-align:center; margin: 8px 0;" x-show="!loading && lines.length > 0">
        <button class="btn-secondary" @click="start_resync()" style="font-size:0.85rem; padding:6px 16px;">
            Re-sync Timestamps
        </button>
    </div>

    <!-- ===== WAVEFORM SYNC OVERLAY ===== -->
    <!-- No separate card-overlay needed: waveform-editor is full-screen with opaque bg -->
    <div
        x-show="syncing"
        class="waveform-editor"
        x-cloak
    >
        <!-- Top bar: Cancel / Title / Save -->
        <div class="waveform-topbar">
            <button class="btn-secondary waveform-cancel-btn" @click="cancel_resync()">
                Cancel
            </button>
            <h2 class="waveform-title">Sync Timestamps</h2>
            <button class="btn-primary waveform-save-btn" @click="confirm_resync()">
                Save
            </button>
        </div>

        <!-- Waveform — Wavesurfer renders here -->
        <div class="waveform-container" x-ref="waveform_container"></div>

        <!-- Playback controls -->
        <div class="waveform-controls">
            <button class="waveform-zoom-btn" @click="ws_zoom_out()" title="Zoom out">&minus;</button>
            <button
                class="waveform-play-btn"
                @click="ws_toggle_play()"
                x-text="ws_playing ? '\u23F8 Pause' : '\u25B6 Play'"
            ></button>
            <button class="waveform-zoom-btn" @click="ws_zoom_in()" title="Zoom in">+</button>
            <button
                class="waveform-loop-btn"
                :class="{ active: ws_loop_selected }"
                @click="ws_toggle_loop()"
                x-show="ws_selected_line !== null"
            >
                Loop
            </button>
            <button
                class="waveform-delete-btn"
                @click="ws_delete_region()"
                x-show="ws_selected_line !== null && sync_marks[ws_selected_line] && sync_marks[ws_selected_line].start_time_ms !== null"
            >
                &#10005;
            </button>
            <span class="waveform-time" x-text="ws_current_time_display"></span>
        </div>

        <!-- Synced count -->
        <div class="waveform-progress">
            <span x-text="sync_marks.filter(m => m.start_time_ms !== null && m.end_time_ms !== null).length + '/' + sync_marks.length + ' lines synced'"></span>
        </div>

        <!-- Line list — tap to select + create/jump to region -->
        <div class="waveform-line-list" x-ref="waveform_line_list">
            <template x-for="(mark, index) in sync_marks" :key="mark.line_id">
                <div
                    class="waveform-line-row"
                    :class="{
                        selected: ws_selected_line === index,
                        synced: mark.start_time_ms !== null && mark.end_time_ms !== null
                    }"
                    @click="ws_select_line(index)"
                >
                    <span class="waveform-line-number" x-text="mark.line_number"></span>
                    <span class="waveform-line-text" x-text="mark.original_text"></span>
                    <span class="waveform-line-check" x-show="mark.start_time_ms !== null && mark.end_time_ms !== null">&#10003;</span>
                    <span
                        class="waveform-line-time"
                        x-show="mark.start_time_ms !== null"
                        x-text="format_time(mark.start_time_ms) + ' \u2192 ' + format_time(mark.end_time_ms)"
                    ></span>
                </div>
            </template>
        </div>

        <!-- Mark START / END buttons + hint text -->
        <div class="waveform-mark-bar">
            <template x-if="ws_selected_line === null">
                <span class="waveform-hint">Select a line below to begin</span>
            </template>
            <template x-if="ws_selected_line !== null && ws_tap_mode === 'start'">
                <button class="waveform-mark-btn mark-start" @click="ws_mark_start()">&#9654; Mark START</button>
            </template>
            <template x-if="ws_selected_line !== null && ws_tap_mode === 'end'">
                <button class="waveform-mark-btn mark-end" @click="ws_mark_end()">&#9632; Mark END</button>
            </template>
            <template x-if="ws_selected_line !== null && ws_tap_mode === null && sync_marks[ws_selected_line] && sync_marks[ws_selected_line].start_time_ms !== null">
                <span class="waveform-hint">Drag edges to adjust &bull; tap &#10005; to redo</span>
            </template>
        </div>
    </div>

    <!-- ===== LINE LIST ===== -->
    <section class="line-list" aria-label="Lyric lines">
        <template x-for="line in lines" :key="line.id">
            <div
                class="line-item"
                :class="{
                    mastered: line.is_mastered,
                    active: active_line_id === line.id,
                    'flash-green': just_mastered_id === line.id
                }"
                @click="open_line_card(line)"
            >
                <span class="line-marker">
                    <template x-if="line.is_mastered">
                        <span>&#10004;</span>
                    </template>
                    <template x-if="!line.is_mastered">
                        <span x-text="line.line_number"></span>
                    </template>
                </span>
                <span class="line-text" x-text="line.original_text"></span>
            </div>
        </template>
    </section>

    <!-- ===== STACK SECTION ===== -->
    <section class="stack-section" x-show="lines.length > 1">
        <h3>Stack &amp; Play</h3>
        <div class="stack-buttons">
            <template x-for="n in stack_range()" :key="n">
                <button
                    class="stack-btn"
                    :class="stack_available(n) ? 'available' : 'locked'"
                    :disabled="!stack_available(n)"
                    @click="stack_available(n) && open_stack(1, n)"
                    x-text="'Play 1\u2013' + n"
                ></button>
            </template>
        </div>
    </section>

    <!-- ===== FULL-SCREEN LINE CARD ===== -->
    <div
        class="card-overlay"
        :class="{ hidden: !show_line_card }"
        @click="close_card()"
    ></div>

    <div
        class="line-card-fullscreen"
        :class="show_line_card ? 'open' : 'closed'"
    >
        <!-- Top bar: close + song title -->
        <div class="line-card-topbar">
            <button class="line-card-close-btn" @click="close_card()">&times;</button>
            <span class="line-card-song-title" x-text="song.title"></span>
            <span style="width:44px"></span>
        </div>

        <!-- Hero zone: lyric + translation, vertically centered -->
        <div class="line-card-hero">
            <div class="line-card-lyric" x-text="current_line ? current_line.original_text : ''"></div>
            <div
                class="line-card-translation"
                :class="{ blurred: translation_hidden }"
                @click="translation_hidden = !translation_hidden"
                x-text="current_line ? (current_line.translation || 'Translation pending...') : ''"
            ></div>
        </div>

        <!-- Playback progress bar: shows position within line clip -->
        <div class="line-card-progress-track">
            <div class="line-card-progress-fill" :style="'width:' + line_progress + '%'"></div>
        </div>

        <!-- Gear panel: timing ±100ms controls (hidden by default) -->
        <div class="line-card-gear-panel" x-show="show_gear_menu" x-cloak>
            <div class="adjust-controls">
                <span class="adjust-label">Start</span>
                <button class="adjust-btn" @click="adjust_time('start', -100)">&minus;100ms</button>
                <span class="timing-value" x-text="current_line ? (current_line.start_time_ms / 1000).toFixed(1) + 's' : ''"></span>
                <button class="adjust-btn" @click="adjust_time('start', 100)">+100ms</button>
            </div>
            <div class="adjust-controls">
                <span class="adjust-label">End</span>
                <button class="adjust-btn" @click="adjust_time('end', -100)">&minus;100ms</button>
                <span class="timing-value" x-text="current_line ? (current_line.end_time_ms / 1000).toFixed(1) + 's' : ''"></span>
                <button class="adjust-btn" @click="adjust_time('end', 100)">+100ms</button>
            </div>
        </div>

        <!-- Bottom dock: transport + master -->
        <div class="line-card-dock">
            <div class="line-card-transport">
                <button class="line-card-gear-btn" :class="{ active: show_gear_menu }" @click="show_gear_menu = !show_gear_menu">
                    &#9881;
                </button>
                <button class="line-card-transport-btn" @click="open_prev_line()">&#9198;</button>
                <button class="line-card-play-btn" @click="toggle_pause()">
                    <span x-text="is_paused ? '\u25B6' : '\u23F8'"></span>
                </button>
                <button class="line-card-transport-btn" @click="open_next_line()">&#9197;</button>
                <span class="line-card-loop-count" x-text="current_loop > 0 ? current_loop + 'x' : ''"></span>
            </div>

            <button
                class="line-card-master-pill"
                :class="{ mastered: current_line && current_line.is_mastered }"
                @click="master_line()"
            >
                <span x-text="current_line && current_line.is_mastered ? '&#10003; Mastered' : 'Master'"></span>
            </button>
        </div>
    </div>

    <!-- ===== SLIDE-UP CARD: STACK MODE ===== -->
    <div
        class="card-overlay"
        :class="{ hidden: !show_stack_card }"
        @click="close_stack()"
    ></div>

    <div
        class="slide-card"
        :class="show_stack_card ? 'open' : 'closed'"
        @touchstart="handle_touch_start($event)"
        @touchmove.prevent="handle_touch_move($event)"
        @touchend="handle_touch_end($event)"
    >
        <div class="card-handle"></div>

        <div class="card-song-title" x-text="song.title"></div>
        <div class="card-loop-counter" x-text="'\uD83D\uDD01 Stack Loop ' + stack_loop"></div>

        <!-- Stacked lines: past dimmed, current large, future dimmed -->
        <div class="stack-lines">
            <template x-for="line in stack_lines" :key="line.id">
                <div>
                    <div
                        class="stack-line"
                        :class="{
                            current: line.id === stack_current_id,
                            past: line.line_number < stack_current_number
                        }"
                        x-text="line.original_text"
                    ></div>
                    <!-- Translation for the currently-playing line only -->
                    <div
                        class="card-translation stack-translation"
                        x-show="line.id === stack_current_id"
                        :class="{ hidden: translation_hidden }"
                        @click="translation_hidden = !translation_hidden"
                        x-text="line.translation || 'Translation pending...'"
                    ></div>
                </div>
            </template>
        </div>

        <button class="pause-btn" @click="toggle_stack_pause()">
            <span x-text="stack_paused ? '\u25B6 Resume Stack' : '\u23F8 Pause Stack'"></span>
        </button>
    </div>

    <!-- ===== LOADING STATE ===== -->
    <div class="empty-state" x-show="loading">
        <p>Loading song&hellip;</p>
    </div>
</div>

<script>
/*
    songPage(song_id) — Alpine.js component for the main learning screen.
    Self-contained: checklist, slide-up card (line + stack modes),
    audio engine, touch gestures, and mastery management.
*/
function songPage(song_id) {
    return {
        /* -- Core data ---------------------------------------- */
        song_id: song_id,
        song: {},
        lines: [],
        loading: true,

        /* -- Line card state ---------------------------------- */
        show_line_card: false,
        current_line: null,
        active_line_id: null,
        translation_hidden: false,
        current_loop: 0,
        max_dots: 10,
        is_paused: false,
        just_mastered_id: null,
        show_gear_menu: false,
        line_progress: 0,
        _save_timing_timeout: null,
        _pending_timing_line: null,

        /* -- Stack card state --------------------------------- */
        show_stack_card: false,
        stack_lines: [],
        stack_current_id: null,
        stack_current_number: 1,
        stack_loop: 0,
        stack_paused: false,

        /* -- Audio engine ------------------------------------- */
        audio: null,           // reusable HTMLAudioElement
        loop_interval: null,   // setInterval id (50ms polling)
        _restart_timeout: null, // setTimeout id (1s gap timer)
        _loop_state: 'idle',   // 'idle' | 'playing' | 'waiting' | 'paused_in_gap'

        /* -- Waveform sync state ------------------------------ */
        syncing: false,
        sync_marks: [],
        ws_instance: null,       // WaveSurfer instance
        ws_regions: null,        // Regions plugin instance
        ws_region_map: {},       // {line_index: region_object}
        ws_selected_line: null,  // index into sync_marks
        ws_playing: false,
        ws_loop_selected: false,
        ws_current_time_display: '0:00.0',
        ws_tap_mode: null,       // null | 'start' | 'end'
        ws_tap_start_sec: null,  // temp start time while waiting for end tap

        /* -- Touch gesture ------------------------------------ */
        touch_start_y: 0,
        touch_delta_y: 0,
        is_swiping: false,

        /* -- Computed ----------------------------------------- */
        get mastered_count() {
            return this.lines.filter(l => l.is_mastered).length;
        },

        /* -- Init --------------------------------------------- */
        async load_song() {
            try {
                const res = await fetch('/api/songs/' + this.song_id);
                if (res.ok) {
                    const data = await res.json();
                    this.song = data;
                    this.lines = data.lines || [];
                }
            } catch (err) {
                console.error('Failed to load song:', err);
            } finally {
                this.loading = false;
            }
        },

        /* -- Stack helpers ------------------------------------ */

        stack_range() {
            const total = this.lines.length;
            if (total < 2) return [];
            const range = [];
            for (let i = 2; i <= total; i++) range.push(i);
            return range;
        },

        stack_available(n) {
            const sorted = [...this.lines].sort(
                (a, b) => a.line_number - b.line_number
            );
            for (let i = 0; i < n; i++) {
                if (!sorted[i] || !sorted[i].is_mastered) return false;
            }
            return true;
        },

        /* ===== LINE CARD ACTIONS ============================= */

        open_line_card(line) {
            this.current_line = line;
            this.active_line_id = line.id;
            this.translation_hidden = false;
            this.current_loop = 0;
            this.is_paused = false;
            this.show_gear_menu = false;
            this.line_progress = 0;
            this.show_line_card = true;

            // Lock background scroll while card is open
            document.body.style.overflow = 'hidden';

            // Start the audio loop
            this.start_line_loop(line);
        },

        close_card() {
            this.show_line_card = false;
            this.active_line_id = null;
            this.line_progress = 0;
            this.stop_audio();
            // Flush pending timing save before closing so recent taps are not lost.
            if (this._save_timing_timeout && this._pending_timing_line) {
                clearTimeout(this._save_timing_timeout);
                this.save_line_timing(this._pending_timing_line);
            }
            this._save_timing_timeout = null;
            this._pending_timing_line = null;
            document.body.style.overflow = '';
        },

        save_line_timing(line) {
            if (!line) return;
            fetch('/api/lyrics/' + line.id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    start_time_ms: line.start_time_ms,
                    end_time_ms: line.end_time_ms,
                }),
            });
        },

        // Skip to previous line (wraps to last)
        open_prev_line() {
            if (!this.current_line || this.lines.length === 0) return;
            const sorted = [...this.lines].sort((a, b) => a.line_number - b.line_number);
            const idx = sorted.findIndex(l => l.id === this.current_line.id);
            const prev = idx > 0 ? sorted[idx - 1] : sorted[sorted.length - 1];
            // Flush pending timing save before switching
            if (this._save_timing_timeout && this._pending_timing_line) {
                clearTimeout(this._save_timing_timeout);
                this.save_line_timing(this._pending_timing_line);
                this._save_timing_timeout = null;
                this._pending_timing_line = null;
            }
            this.current_line = prev;
            this.active_line_id = prev.id;
            this.current_loop = 0;
            this.line_progress = 0;
            this.show_gear_menu = false;
            this.start_line_loop(prev);
        },

        // Skip to next line (wraps to first)
        open_next_line() {
            if (!this.current_line || this.lines.length === 0) return;
            const sorted = [...this.lines].sort((a, b) => a.line_number - b.line_number);
            const idx = sorted.findIndex(l => l.id === this.current_line.id);
            const next = idx < sorted.length - 1 ? sorted[idx + 1] : sorted[0];
            if (this._save_timing_timeout && this._pending_timing_line) {
                clearTimeout(this._save_timing_timeout);
                this.save_line_timing(this._pending_timing_line);
                this._save_timing_timeout = null;
                this._pending_timing_line = null;
            }
            this.current_line = next;
            this.active_line_id = next.id;
            this.current_loop = 0;
            this.line_progress = 0;
            this.show_gear_menu = false;
            this.start_line_loop(next);
        },

        async master_line() {
            if (!this.current_line) return;

            try {
                const res = await fetch(
                    '/api/lyrics/' + this.current_line.id + '/master',
                    { method: 'PUT' }
                );

                if (res.ok) {
                    this.current_line.is_mastered = !this.current_line.is_mastered;

                    if (this.current_line.is_mastered) {
                        // Just mastered — flash green in checklist, then close card
                        this.just_mastered_id = this.current_line.id;
                        setTimeout(() => { this.just_mastered_id = null; }, 700);
                        setTimeout(() => { this.close_card(); }, 400);
                    }
                }
            } catch (err) {
                console.error('Failed to toggle mastery:', err);
            }
        },

        // Adjust start or end timestamp by delta_ms, then restart the loop
        // so the new boundaries take effect immediately. Debounces the
        // server save so rapid taps don't hammer the API.
        adjust_time(which, delta_ms) {
            if (!this.current_line) return;

            if (which === 'start') {
                const new_val = this.current_line.start_time_ms + delta_ms;
                // Don't go below 0 or past the end
                if (new_val < 0 || new_val >= this.current_line.end_time_ms) return;
                this.current_line.start_time_ms = new_val;
            } else {
                const new_val = this.current_line.end_time_ms + delta_ms;
                // Don't go at or below start
                if (new_val <= this.current_line.start_time_ms) return;
                // Don't exceed audio duration (if known)
                if (this.audio && this.audio.duration && new_val > this.audio.duration * 1000) return;
                this.current_line.end_time_ms = new_val;
            }

            // Restart the loop so new boundaries take effect
            this.start_line_loop(this.current_line);

            // Debounced save — waits 500ms after last tap
            // Capture line reference now so the callback is safe even if
            // the card closes before the timeout fires (Issue #1)
            const line_to_save = this.current_line;
            clearTimeout(this._save_timing_timeout);
            this._pending_timing_line = line_to_save;
            this._save_timing_timeout = setTimeout(() => {
                if (!line_to_save) return;
                this.save_line_timing(line_to_save);
                this._pending_timing_line = null;
            }, 500);
        },

        toggle_pause() {
            this.is_paused = !this.is_paused;
            if (!this.audio) return;

            if (this.is_paused) {
                this.audio.pause();
                // If paused during the 1s gap, cancel the restart timer
                if (this._loop_state === 'waiting') {
                    clearTimeout(this._restart_timeout);
                    this._restart_timeout = null;
                    this._loop_state = 'paused_in_gap';
                }
            } else {
                if (this._loop_state === 'paused_in_gap') {
                    // Resume from gap: restart the 1s gap timer
                    this._loop_state = 'waiting';
                    this._restart_timeout = setTimeout(() => {
                        if (this._loop_state !== 'waiting') return;
                        this._loop_state = 'playing';
                        if (!this.show_line_card || this.is_paused) return;
                        this.audio.currentTime = this.current_line.start_time_ms / 1000;
                        this.audio.play().catch(() => {});
                    }, 1000);
                } else {
                    this.audio.play();
                }
            }
        },

        /* ===== STACK CARD ACTIONS ============================ */

        open_stack(start, end) {
            this.stack_lines = [...this.lines]
                .filter(l => l.line_number >= start && l.line_number <= end)
                .sort((a, b) => a.line_number - b.line_number);

            if (this.stack_lines.length === 0) return;

            this.stack_current_id = this.stack_lines[0].id;
            this.stack_current_number = this.stack_lines[0].line_number;
            this.stack_loop = 1;
            this.stack_paused = false;
            this.translation_hidden = false;
            this.show_stack_card = true;

            document.body.style.overflow = 'hidden';
            this.start_stack_loop(this.stack_lines);
        },

        close_stack() {
            this.show_stack_card = false;
            this.stop_audio();
            document.body.style.overflow = '';
        },

        toggle_stack_pause() {
            this.stack_paused = !this.stack_paused;
            if (!this.audio) return;

            if (this.stack_paused) {
                this.audio.pause();
                if (this._loop_state === 'waiting') {
                    clearTimeout(this._restart_timeout);
                    this._restart_timeout = null;
                    this._loop_state = 'paused_in_gap';
                }
            } else {
                if (this._loop_state === 'paused_in_gap') {
                    this._loop_state = 'waiting';
                    const sl = this.stack_lines;
                    const start_sec = sl[0].start_time_ms / 1000;
                    this._restart_timeout = setTimeout(() => {
                        if (this._loop_state !== 'waiting') return;
                        this._loop_state = 'playing';
                        if (!this.show_stack_card || this.stack_paused) return;
                        this.audio.currentTime = start_sec;
                        this.stack_current_id = sl[0].id;
                        this.stack_current_number = sl[0].line_number;
                        this.audio.play().catch(() => {});
                    }, 1000);
                } else {
                    this.audio.play();
                }
            }
        },

        /* ===== AUDIO ENGINE ================================== */

        /*
            Single-line loop: seek to start, poll 50ms, pause at end,
            ~1s gap (SPECS.md D), re-seek, play again.
        */
        start_line_loop(line) {
            this.stop_audio();

            if (!this.song || !this.song.audio_file_path) return;
            if (line.start_time_ms == null || line.end_time_ms == null) return;
            // Guard against corrupted timestamps (would cause instant end detection)
            if (line.end_time_ms <= line.start_time_ms) return;

            if (!this.audio) this.audio = new Audio();
            const src = '/' + this.song.audio_file_path;
            const start_sec = line.start_time_ms / 1000;
            const end_sec = line.end_time_ms / 1000;

            const begin_loop = () => {
                this.audio.currentTime = start_sec;
                this.audio.play().catch(err => console.warn('Autoplay blocked:', err));
                this._loop_state = 'playing';
            };

            const needs_load = !this.audio.src || !this.audio.src.includes(this.song.audio_file_path);
            if (needs_load) {
                this.audio.src = src;
                this.audio.addEventListener('loadedmetadata', begin_loop, { once: true });
                this.audio.addEventListener('error', () => {
                    console.error('Audio failed to load:', src);
                }, { once: true });
            } else {
                begin_loop();
            }

            this.loop_interval = setInterval(() => {
                if (this._loop_state !== 'playing' || this.is_paused) return;

                // Update playback progress bar (0-100%)
                const elapsed = this.audio.currentTime - start_sec;
                const duration = end_sec - start_sec;
                this.line_progress = Math.max(0, Math.min(100, (elapsed / duration) * 100));

                if (this.audio.currentTime >= end_sec) {
                    this.audio.pause();
                    this.current_loop++;
                    this._loop_state = 'waiting';

                    fetch('/api/lyrics/' + line.id + '/loop', { method: 'PUT' });

                    // Tracked 1s gap timer — can be cancelled by stop_audio()
                    this._restart_timeout = setTimeout(() => {
                        if (this._loop_state !== 'waiting') return;
                        this._loop_state = 'playing';
                        if (!this.show_line_card || this.is_paused) return;
                        this.audio.currentTime = start_sec;
                        this.audio.play().catch(() => {});
                    }, 1000);
                }
            }, 50);
        },

        /*
            Stack loop: continuous audio from first line start to last line end.
            Updates current-line highlight via 50ms polling. Auto-loops.
        */
        start_stack_loop(lines) {
            this.stop_audio();

            if (!this.song || !this.song.audio_file_path) return;
            if (lines.length === 0) return;

            const first_line = lines[0];
            const last_line = lines[lines.length - 1];
            if (first_line.start_time_ms == null || last_line.end_time_ms == null) return;
            if (last_line.end_time_ms <= first_line.start_time_ms) return;

            if (!this.audio) this.audio = new Audio();
            const src = '/' + this.song.audio_file_path;
            const start_sec = first_line.start_time_ms / 1000;
            const end_sec = last_line.end_time_ms / 1000;

            const begin_loop = () => {
                this.audio.currentTime = start_sec;
                this.audio.play().catch(err => console.warn('Autoplay blocked:', err));
                this._loop_state = 'playing';
            };

            const needs_load = !this.audio.src || !this.audio.src.includes(this.song.audio_file_path);
            if (needs_load) {
                this.audio.src = src;
                this.audio.addEventListener('loadedmetadata', begin_loop, { once: true });
                this.audio.addEventListener('error', () => {
                    console.error('Audio failed to load:', src);
                }, { once: true });
            } else {
                begin_loop();
            }

            this.loop_interval = setInterval(() => {
                if (this._loop_state !== 'playing' || this.stack_paused) return;

                const current_ms = this.audio.currentTime * 1000;
                this.update_current_stack_line(current_ms, lines);

                if (this.audio.currentTime >= end_sec) {
                    this.audio.pause();
                    this.stack_loop++;
                    this._loop_state = 'waiting';

                    this._restart_timeout = setTimeout(() => {
                        if (this._loop_state !== 'waiting') return;
                        this._loop_state = 'playing';
                        if (!this.show_stack_card || this.stack_paused) return;
                        this.audio.currentTime = start_sec;
                        this.stack_current_id = lines[0].id;
                        this.stack_current_number = lines[0].line_number;
                        this.audio.play().catch(() => {});
                    }, 1000);
                }
            }, 50);
        },

        stop_audio() {
            if (this.audio) this.audio.pause();
            if (this.loop_interval) {
                clearInterval(this.loop_interval);
                this.loop_interval = null;
            }
            // Cancel any pending gap timer (prevents zombie playback)
            if (this._restart_timeout) {
                clearTimeout(this._restart_timeout);
                this._restart_timeout = null;
            }
            this._loop_state = 'idle';
        },

        /* Walk backward: last line whose start <= current wins */
        update_current_stack_line(current_ms, lines) {
            for (let i = lines.length - 1; i >= 0; i--) {
                if (current_ms >= lines[i].start_time_ms) {
                    this.stack_current_id = lines[i].id;
                    this.stack_current_number = lines[i].line_number;
                    return;
                }
            }
            this.stack_current_id = lines[0].id;
            this.stack_current_number = lines[0].line_number;
        },

        /* ===== WAVEFORM SYNC (visual timestamp editor) ======= */

        start_resync() {
            // Preserve existing timestamps (don't null them out)
            this.sync_marks = this.lines.map(l => ({
                line_id: l.id,
                line_number: l.line_number,
                original_text: l.original_text,
                start_time_ms: l.start_time_ms,
                end_time_ms: l.end_time_ms,
            }));
            this.ws_selected_line = null;
            this.ws_playing = false;
            this.ws_loop_selected = false;
            this.ws_region_map = {};
            this.syncing = true;

            this.stop_audio();
            document.body.style.overflow = 'hidden';

            // Init Wavesurfer after Alpine renders the container
            this.$nextTick(() => { this.ws_init_wavesurfer(); });
        },

        ws_init_wavesurfer() {
            const container = this.$refs.waveform_container;
            if (!container) return;

            // Guard: CDN might fail to load
            if (typeof WaveSurfer === 'undefined') {
                alert('Waveform editor failed to load. Check your internet connection.');
                this.cancel_resync();
                return;
            }

            this.ws_regions = WaveSurfer.Regions.create();

            this.ws_instance = WaveSurfer.create({
                container: container,
                waveColor: '#5e5b6e',
                progressColor: '#9B2D5E',
                cursorColor: '#ece9f4',
                cursorWidth: 1,
                height: 100,
                barWidth: 2,
                barGap: 1,
                barRadius: 2,
                normalize: true,
                url: '/' + this.song.audio_file_path,
                plugins: [this.ws_regions],
            });

            // When audio is decoded, zoom to a useful level + add regions
            this.ws_instance.on('ready', () => {
                this._ws_zoom = 50;
                this.ws_instance.zoom(this._ws_zoom);
                this.ws_populate_regions();
            });

            // Pinch-to-zoom on the waveform container
            let pinch_start_dist = 0;
            let pinch_start_zoom = this._ws_zoom;
            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    pinch_start_dist = Math.sqrt(dx * dx + dy * dy);
                    pinch_start_zoom = this._ws_zoom;
                }
            });
            container.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const scale = dist / pinch_start_dist;
                    const new_zoom = Math.max(10, Math.min(800, pinch_start_zoom * scale));
                    this._ws_zoom = new_zoom;
                    this.ws_instance.zoom(new_zoom);
                }
            });

            this.ws_instance.on('play', () => { this.ws_playing = true; });
            this.ws_instance.on('pause', () => { this.ws_playing = false; });

            // Tap waveform to set START then END for selected line
            this.ws_instance.on('interaction', (time) => {
                if (this.ws_tap_mode === 'start') {
                    this.ws_tap_start_sec = time;
                    this.ws_tap_mode = 'end';
                } else if (this.ws_tap_mode === 'end' && this.ws_selected_line !== null) {
                    let s = this.ws_tap_start_sec;
                    let e = time;
                    // Swap if tapped in reverse order
                    if (e < s) { const tmp = s; s = e; e = tmp; }
                    // Minimum 0.3s region
                    if (e - s < 0.3) e = s + 0.3;

                    const mark = this.sync_marks[this.ws_selected_line];
                    mark.start_time_ms = Math.round(s * 1000);
                    mark.end_time_ms = Math.round(e * 1000);

                    // Create the visual region
                    const colors = this.ws_generate_colors(this.sync_marks.length);
                    const region = this.ws_regions.addRegion({
                        start: s, end: e,
                        color: colors[this.ws_selected_line],
                        drag: true, resize: true,
                        id: 'line-' + this.ws_selected_line,
                    });
                    this.ws_region_map[this.ws_selected_line] = region;
                    this.ws_tap_mode = null;
                    this.ws_tap_start_sec = null;
                }
            });

            // Update time display + handle loop logic
            this.ws_instance.on('timeupdate', (time) => {
                this.ws_current_time_display = this.format_time(Math.round(time * 1000));

                // Loop within selected region if enabled
                if (this.ws_loop_selected && this.ws_selected_line !== null) {
                    const mark = this.sync_marks[this.ws_selected_line];
                    if (mark.end_time_ms !== null && time >= mark.end_time_ms / 1000) {
                        this.ws_instance.setTime(mark.start_time_ms / 1000);
                    }
                }
            });

            // Region drag/resize end — update sync_marks
            this.ws_regions.on('region-updated', (region) => {
                const idx = this.ws_find_line_index(region);
                if (idx === null) return;
                this.sync_marks[idx].start_time_ms = Math.round(region.start * 1000);
                this.sync_marks[idx].end_time_ms = Math.round(region.end * 1000);
            });

            // Region clicked — select that line
            this.ws_regions.on('region-clicked', (region, e) => {
                e.stopPropagation();
                const idx = this.ws_find_line_index(region);
                if (idx !== null) this.ws_select_line(idx);
            });
        },

        // Add colored regions for lines that already have timestamps
        ws_populate_regions() {
            const colors = this.ws_generate_colors(this.sync_marks.length);
            this.sync_marks.forEach((mark, index) => {
                if (mark.start_time_ms !== null && mark.end_time_ms !== null) {
                    const region = this.ws_regions.addRegion({
                        start: mark.start_time_ms / 1000,
                        end: mark.end_time_ms / 1000,
                        color: colors[index],
                        drag: true,
                        resize: true,
                        id: 'line-' + index,
                    });
                    this.ws_region_map[index] = region;
                }
            });
        },

        // Golden angle hue rotation for distinct colors across many lines
        ws_generate_colors(count) {
            const colors = [];
            for (let i = 0; i < count; i++) {
                const hue = (330 + i * 137) % 360;
                colors.push('hsla(' + hue + ', 60%, 50%, 0.25)');
            }
            return colors;
        },

        // Tap a line → select it; if synced seek to region, if not enter tap mode
        ws_select_line(index) {
            this.ws_selected_line = index;
            this.ws_tap_mode = null;
            this.ws_tap_start_sec = null;

            // Scroll line into view
            this.$nextTick(() => {
                const list = this.$refs.waveform_line_list;
                if (!list) return;
                const row = list.children[index];
                if (row) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            });

            const mark = this.sync_marks[index];

            // If line already has a region, zoom to it and loop
            if (mark.start_time_ms !== null && this.ws_instance) {
                this.ws_focus_region(mark.start_time_ms / 1000, mark.end_time_ms / 1000);
                this.ws_loop_selected = true;
                this.ws_instance.setTime(mark.start_time_ms / 1000);
                if (!this.ws_playing) this.ws_instance.play();
                return;
            }

            // No region yet — enter tap-to-set-start mode
            this.ws_tap_mode = 'start';
        },

        // Find which line index a region belongs to
        ws_find_line_index(region) {
            for (const [idx, reg] of Object.entries(this.ws_region_map)) {
                if (reg === region) return parseInt(idx);
            }
            return null;
        },

        ws_toggle_play() {
            if (!this.ws_instance) return;
            this.ws_instance.playPause();
        },

        ws_toggle_loop() {
            this.ws_loop_selected = !this.ws_loop_selected;
            // If turning on, seek to region start and play
            if (this.ws_loop_selected && this.ws_selected_line !== null) {
                const mark = this.sync_marks[this.ws_selected_line];
                if (mark.start_time_ms !== null && this.ws_instance) {
                    this.ws_instance.setTime(mark.start_time_ms / 1000);
                    if (!this.ws_playing) this.ws_instance.play();
                }
            }
        },

        // Capture current playback time as line start
        ws_mark_start() {
            if (!this.ws_instance || this.ws_selected_line === null) return;
            this.ws_tap_start_sec = this.ws_instance.getCurrentTime();
            this.ws_tap_mode = 'end';
        },

        // Capture current playback time as line end, create region,
        // then auto-zoom to region and start looping it
        ws_mark_end() {
            if (!this.ws_instance || this.ws_selected_line === null) return;
            let s = this.ws_tap_start_sec;
            let e = this.ws_instance.getCurrentTime();
            if (e < s) { const tmp = s; s = e; e = tmp; }
            if (e - s < 0.3) e = s + 0.3;

            const mark = this.sync_marks[this.ws_selected_line];
            mark.start_time_ms = Math.round(s * 1000);
            mark.end_time_ms = Math.round(e * 1000);

            // Create the visual region
            const colors = this.ws_generate_colors(this.sync_marks.length);
            const region = this.ws_regions.addRegion({
                start: s, end: e,
                color: colors[this.ws_selected_line],
                drag: true, resize: true,
                id: 'line-' + this.ws_selected_line,
            });
            this.ws_region_map[this.ws_selected_line] = region;
            this.ws_tap_mode = null;
            this.ws_tap_start_sec = null;

            // Auto-zoom so region fills ~60% of screen width, with padding
            this.ws_focus_region(s, e);

            // Auto-loop the region so user hears it and can drag edges
            this.ws_loop_selected = true;
            this.ws_instance.setTime(s);
            if (!this.ws_playing) this.ws_instance.play();
        },

        // Zoom + scroll to show a time range with padding
        ws_focus_region(start_sec, end_sec) {
            if (!this.ws_instance) return;
            const container = this.$refs.waveform_container;
            if (!container) return;
            const container_width = container.clientWidth;
            const duration = end_sec - start_sec;
            // Zoom so region takes ~60% of visible width
            const target_zoom = (container_width * 0.6) / duration;
            this._ws_zoom = Math.max(10, Math.min(800, target_zoom));
            this.ws_instance.zoom(this._ws_zoom);
            // Scroll to center the region (after zoom redraws)
            this.$nextTick(() => {
                const center_px = ((start_sec + end_sec) / 2) * this._ws_zoom;
                const scroll_to = center_px - container_width / 2;
                container.scrollLeft = Math.max(0, scroll_to);
            });
        },

        // Zoom: pixels per second of audio. Higher = more spread out.
        _ws_zoom: 50,

        ws_zoom_in() {
            if (!this.ws_instance) return;
            this._ws_zoom = Math.min(this._ws_zoom * 2, 800);
            this.ws_instance.zoom(this._ws_zoom);
        },

        ws_zoom_out() {
            if (!this.ws_instance) return;
            this._ws_zoom = Math.max(this._ws_zoom / 2, 10);
            this.ws_instance.zoom(this._ws_zoom);
        },

        // Delete region for selected line, then re-enter tap mode
        ws_delete_region() {
            if (this.ws_selected_line === null) return;
            const mark = this.sync_marks[this.ws_selected_line];
            mark.start_time_ms = null;
            mark.end_time_ms = null;
            // Remove the visual region from the waveform
            const region = this.ws_region_map[this.ws_selected_line];
            if (region) {
                region.remove();
                delete this.ws_region_map[this.ws_selected_line];
            }
            // Re-enter tap mode so user can redo
            this.ws_tap_mode = 'start';
            this.ws_tap_start_sec = null;
        },

        ws_destroy() {
            if (this.ws_instance) {
                this.ws_instance.destroy();
                this.ws_instance = null;
            }
            this.ws_regions = null;
            this.ws_region_map = {};
            this.ws_selected_line = null;
            this.ws_playing = false;
            this.ws_loop_selected = false;
        },

        cancel_resync() {
            this.ws_destroy();
            this.syncing = false;
            document.body.style.overflow = '';
        },

        format_time(ms) {
            if (ms == null) return '--:--';
            const secs = ms / 1000;
            const m = Math.floor(secs / 60);
            const s = (secs % 60).toFixed(1);
            return m + ':' + s.padStart(4, '0');
        },

        async confirm_resync() {
            const timestamps = this.sync_marks
                .filter(m => m.start_time_ms != null && m.end_time_ms != null)
                .map(m => ({
                    line_id: m.line_id,
                    start_time_ms: m.start_time_ms,
                    end_time_ms: m.end_time_ms,
                }));

            if (timestamps.length === 0) {
                alert('No timestamps to save. Select lines and set regions first.');
                return;
            }

            try {
                const res = await fetch('/api/songs/' + this.song_id + '/timestamps', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({timestamps})
                });
                if (!res.ok) {
                    alert('Failed to save timestamps. Please try again.');
                    return;
                }
                this.ws_destroy();
                this.syncing = false;
                document.body.style.overflow = '';
                await this.load_song();
            } catch (e) {
                alert('Error saving timestamps: ' + e.message);
            }
        },

        /* ===== TOUCH SWIPE-DOWN GESTURE ====================== */

        handle_touch_start(event) {
            this.touch_start_y = event.touches[0].clientY;
            this.touch_delta_y = 0;
            this.is_swiping = true;
        },

        handle_touch_move(event) {
            if (!this.is_swiping) return;
            const current_y = event.touches[0].clientY;
            this.touch_delta_y = current_y - this.touch_start_y;

            // Only allow downward swipe
            if (this.touch_delta_y < 0) {
                this.touch_delta_y = 0;
                return;
            }

            // Visual feedback: card follows the finger
            event.currentTarget.style.transform =
                'translateY(' + this.touch_delta_y + 'px)';
        },

        handle_touch_end(event) {
            if (!this.is_swiping) return;
            this.is_swiping = false;

            const card = event.currentTarget;

            if (this.touch_delta_y > 100) {
                // Dragged far enough — dismiss
                if (this.show_line_card) this.close_card();
                else if (this.show_stack_card) this.close_stack();
            }

            // Reset transform (snap back or let CSS handle close)
            card.style.transform = '';
            this.touch_delta_y = 0;
        },
    };
}
</script>
