version: "3.8"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist database and uploads across container restarts
      - ./lyricflow.db:/app/lyricflow.db
      - ./lyricflow/static/uploads:/app/lyricflow/static/uploads
    env_file:
      - lyricflow/.env
    restart: unless-stopped
